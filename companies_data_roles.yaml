# ===========================================================================
# companies_data_roles.yaml — THE data-lane daily driver.
# Every confirmed source + tenant (53 endpoints), location-agnostic,
# DE / DA / DS / ML title net. This is the primary tech search.
#
#   python jobhunt.py --config companies_data_roles.yaml --new-only
#
# Companion file: companies_other.yaml — SAME company list, ops/business
# analyst title net. It exists separately because it UN-EXCLUDES 'manager'
# (to catch Operations Manager) while this file EXCLUDES it. Opposite filter
# rules can't share one config. Run them as two passes.
#
# Adding tenants: see probes/README.md for the verify-first recipe per ATS.
# ===========================================================================

