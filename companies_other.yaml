# ===========================================================================
# companies_other.yaml — ops / business-analyst lane across the SAME
# 53 company endpoints as companies_data_roles.yaml.
#
#   python jobhunt.py --config companies_other.yaml --new-only
#
# WHY THIS IS A SEPARATE FILE (not merged into the data config):
#   * 'manager' is DELIBERATELY NOT in exclude_titles here — Operations
#     Manager is the single most defensible title in the resume bank (GM with
#     real P&L). The data config excludes 'manager' so its report isn't
#     flooded. Opposite rules, so: two files, two runs.
#   * 'senior' / 'sr.' ARE excluded here (unlike the data config) — these ops
#     lanes skew senior and the bank defends mid-level.
#   * save_jds writes to jds_other/ so ops JDs don't pollute the DE/DA keyword
#     corpus that feeds resume tailoring.
#   * html: other.html so the daily jobs.html stays the data report.
#
# Title lanes below mirror companies_fallback.yaml (business/systems analyst,
# healthcare ops, sales/rev ops, supply chain, pure ops) but run against the
# full big-corporate watchlist instead of FL/TX-only sources.
# ===========================================================================

