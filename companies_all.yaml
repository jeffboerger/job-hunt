# --- Adzuna: aggregator catch-all for custom-portal giants (Exxon, JPMorgan,
#     Fidelity Investments) with no native endpoint. Broad metro list. --------
adzuna:
  distance_km: 40
  queries:
  - data engineer
  - data analyst
  wheres:
  - Seattle, WA
  - Portland, OR
  - Minneapolis, MN
  - Denver, CO
  - Raleigh, NC
  - Pittsburgh, PA
  - Salt Lake City, UT
  - Boise, ID
  - Houston, TX
  - Dallas, TX
  - Austin, TX
  - Boston, MA
  - Charlotte, NC
  - New York, NY
  - Chicago, IL
  - Orlando, FL
  - Tampa, FL

usajobs:
  email: jeff.boerger@gmail.com
  keywords:
  - data engineer
  - data analyst
  days: 30

remotive: true

search:
  since: 2w
  save_jds: jds
  titles:
  - data engineer
  - analytics engineer
  - etl
  - data platform
  - data infrastructure
  - data warehouse
  - bi engineer
  - data analyst
  - business intelligence
  - bi analyst
  - reporting analyst
  - product analyst
  - data scientist
  - machine learning
  - ml engineer
  - applied scientist
  - ai engineer
  # location-agnostic: no location filter cuts by geo. Keep Remote + broad
  # state coverage so nothing US gets dropped; exclude_locations handles non-US.
  locations:
  - Remote
  - US
  - United States
  - WA
  - OR
  - CA
  - MN
  - CO
  - NC
  - PA
  - UT
  - ID
  - TX
  - MA
  - NY
  - IL
  - FL
  - GA
  - VA
  - AZ
  - TN
  - IA
  - IL
  exclude_titles:
  - staff
  - principal
  - director
  - manager
  - sr. staff
  - vp
  exclude_locations:
  - canada
  - india
  - poland
  - spain
  - mexico
