# ===========================================================================
# companies_all.yaml — THE combined daily driver.
# Location-agnostic, every confirmed source + tenant, DE/DA/DS title net.
# Merges: companies_open + companies_eightfold + companies_radancy +
#         companies_energy_finance. One long run = "catch all the companies".
#
#   python jobhunt.py --config companies_all.yaml --new-only
#
# NOT merged here (on purpose): companies_fallback.yaml stays a SEPARATE run.
# It un-excludes 'manager' to catch Operations Manager (your most defensible
# title) and adds ops/BA titles — the OPPOSITE exclude rule from this tech
# search. Merging them flat would either kill the ops lane or flood this
# report with manager roles. Run fallback on its own when you want that lane:
#   python jobhunt.py --config companies_fallback.yaml --new-only
#
# Adding tenants later: see probes/README.md for the verify-first recipe per
# ATS family (eightfold / radancy / workday).
# ===========================================================================

